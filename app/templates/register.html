{% extends "base.html" %}
{% block title %}Sign up · Calibrate{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>calibrate</h1>
  <p class="tagline">Precision Fueling</p>
  <p class="auth-sub">Create your account.</p>
  {% if error %}<p class="auth-error">{{ error }}</p>{% endif %}
  <form method="post" action="/register">
    <label>Email
      <input type="email" name="email" required autocomplete="email" autofocus>
    </label>
    <label>Password <small>(8+ characters)</small>
      <input type="password" name="password" required minlength="8" autocomplete="new-password">
    </label>
    <button type="submit" class="primary">Create account</button>
  </form>
  <p class="auth-alt">Already have an account? <a href="/login">Log in</a></p>
</div>
{% endblock %}
