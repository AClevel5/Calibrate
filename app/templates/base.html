<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e1812">
  <title>{% block title %}Calibrate{% endblock %}</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calibrate">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">calibrate</a>
    {% if user %}
    <nav>
      <a href="/day/{{ today.isoformat() }}">Today</a>
      <a href="/week/{{ today.isoformat() }}">Week</a>
      <a href="/settings">Settings</a>
      <form action="/logout" method="post" class="logout-form">
        <button type="submit" class="link-btn">Log out</button>
      </form>
    </nav>
    {% endif %}
  </header>

  <main{% if not user %} class="centered"{% endif %}>
    {% block content %}{% endblock %}
  </main>

  {% if user %}
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js"));
    }
  </script>
  {% endif %}
  {% block scripts %}{% endblock %}
</body>
</html>
